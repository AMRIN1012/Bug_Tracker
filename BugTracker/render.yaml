services:
  - type: web
    name: bug-tracker
    runtime: python
    buildCommand: ./build.sh
    startCommand: gunicorn bugtracker_project.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bug-tracker-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.11.9"

databases:
  - name: bug-tracker-db
    plan: free
