{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block page_title %}Sign In{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
  <div class="col-md-5 col-lg-4">
    <div class="card-custom text-center shadow border-0" style="padding: 32px 24px;">
      <div class="mb-4">
        <i class="bi bi-bug-fill text-primary" style="font-size: 3rem;"></i>
        <h3 class="mt-2 font-weight-bold" style="letter-spacing: 0.5px;">Welcome Back</h3>
        <p class="text-muted" style="font-size: 0.875rem;">Access the Advanced Issue Tracker</p>
      </div>

      <form method="POST" action="{% url 'login' %}">
        {% csrf_token %}
        <div class="mb-3 text-start">
          <label for="id_username" class="form-label" style="font-size: 0.85rem; font-weight: 600;">Username or Email</label>
          {{ form.username }}
        </div>
        <div class="mb-4 text-start">
          <label for="id_password" class="form-label" style="font-size: 0.85rem; font-weight: 600;">Password</label>
          {{ form.password }}
        </div>

        <button type="submit" class="btn btn-primary w-100 py-2.5 font-weight-semibold" style="border-radius: 8px; font-weight: 600;">
          Sign In
        </button>
      </form>

      <div class="mt-4 pt-2 border-top text-center" style="border-color: var(--border-color) !important; font-size: 0.85rem;">
        <span class="text-muted">New user? </span>
        <a href="{% url 'register' %}" class="text-primary font-weight-bold text-decoration-none">Create Account</a>
        <br>
        <a href="{% url 'password_reset' %}" class="text-secondary text-decoration-none d-inline-block mt-2">Forgot Password?</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
