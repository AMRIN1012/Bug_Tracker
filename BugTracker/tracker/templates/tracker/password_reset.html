{% extends 'base.html' %}
{% block title %}Reset Password{% endblock %}
{% block page_title %}Reset Password{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
  <div class="col-md-5 col-lg-4">
    <div class="card-custom text-center shadow border-0" style="padding: 32px 24px;">
      <div class="mb-4">
        <i class="bi bi-key-fill text-primary" style="font-size: 3rem;"></i>
        <h3 class="mt-2 font-weight-bold" style="letter-spacing: 0.5px;">Recover Password</h3>
        <p class="text-muted" style="font-size: 0.875rem;">Enter your email to request a reset link</p>
      </div>

      <form method="POST" action="{% url 'password_reset' %}">
        {% csrf_token %}
        <div class="mb-4 text-start">
          <label for="email" class="form-label" style="font-size: 0.85rem; font-weight: 600;">Email Address</label>
          <input type="email" name="email" id="email" class="form-control" placeholder="name@example.com" required>
        </div>

        <button type="submit" class="btn btn-primary w-100 py-2.5 font-weight-semibold" style="border-radius: 8px; font-weight: 600;">
          Send Reset Link
        </button>
      </form>

      <div class="mt-4 pt-2 border-top text-center" style="border-color: var(--border-color) !important; font-size: 0.85rem;">
        <span class="text-muted">Remembered it? </span>
        <a href="{% url 'login' %}" class="text-primary font-weight-bold text-decoration-none">Sign In</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
