{% extends "base.html" %}
{% block title %}New Release{% endblock %}
{% block content %}
<div class="d-flex align-items-center mb-4">
  <a href="{% url 'project_detail' project.pk %}" class="btn btn-sm btn-outline-secondary me-3">
    <i class="bi bi-arrow-left me-1"></i>Back to {{ project.name }}
  </a>
  <h1 class="h3 fw-bold mb-0">Create Release</h1>
</div>
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card border-0 shadow-sm" style="border-radius:16px;">
      <div class="card-body p-4">
        <form method="POST">{% csrf_token %}
          <div class="mb-3">
            <label class="form-label fw-semibold">Version Name <span class="text-danger">*</span></label>
            <input type="text" name="version_name" class="form-control" required placeholder="e.g. v2.1.0">
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Release Date</label>
            <input type="date" name="release_date" class="form-control">
            <div class="form-text">Leave blank if the date is not yet confirmed.</div>
          </div>
          <div class="d-flex gap-3">
            <button type="submit" class="btn btn-success px-4"><i class="bi bi-tag me-2"></i>Create Release</button>
            <a href="{% url 'project_detail' project.pk %}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
