{% extends "base.html" %}
{% block title %}New Sprint{% endblock %}
{% block content %}
<div class="d-flex align-items-center mb-4">
  <a href="{% url 'project_detail' project.pk %}" class="btn btn-sm btn-outline-secondary me-3">
    <i class="bi bi-arrow-left me-1"></i>Back to {{ project.name }}
  </a>
  <h1 class="h3 fw-bold mb-0">Create Sprint</h1>
</div>
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card border-0 shadow-sm" style="border-radius:16px;">
      <div class="card-body p-4">
        <form method="POST">{% csrf_token %}
          <div class="mb-3">
            <label class="form-label fw-semibold">Sprint Name <span class="text-danger">*</span></label>
            <input type="text" name="name" class="form-control" required placeholder="e.g. Sprint 1 - Auth Module">
          </div>
          <div class="row g-3 mb-3">
            <div class="col-6">
              <label class="form-label fw-semibold">Start Date</label>
              <input type="date" name="start_date" class="form-control">
            </div>
            <div class="col-6">
              <label class="form-label fw-semibold">End Date</label>
              <input type="date" name="end_date" class="form-control">
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Status</label>
            <select name="status" class="form-select">
              <option value="Planning">Planning</option>
              <option value="Active">Active</option>
              <option value="Completed">Completed</option>
            </select>
          </div>
          <div class="d-flex gap-3">
            <button type="submit" class="btn btn-primary px-4"><i class="bi bi-lightning me-2"></i>Create Sprint</button>
            <a href="{% url 'project_detail' project.pk %}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
